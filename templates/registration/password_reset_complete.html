{% extends 'landing_base.html' %}

{% block title %}Password Reset Complete - Smart Agricultural Loan System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header text-center py-3">
                <h4 class="mb-0"><i class="bi bi-check-circle-fill me-2"></i>Password Reset Complete</h4>
            </div>
            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-shield-check text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="mb-3">Your password has been set!</h5>
                <p class="mb-4">You may go ahead and log in now.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
