<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Agricultural Loan System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --agri-green: #2e7d32;
            --agri-green-light: #4caf50;
            --agri-green-dark: #1b5e20;
            --agri-light: #e8f5e9;
        }
        
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--agri-green-dark), var(--agri-green));
        }
        
        .btn-primary {
            background-color: var(--agri-green);
            border-color: var(--agri-green);
        }
        
        .btn-primary:hover {
            background-color: var(--agri-green-dark);
            border-color: var(--agri-green-dark);
        }
        
        .footer {
            background: linear-gradient(135deg, var(--agri-green-dark), var(--agri-green));
            color: white;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-flower1 me-2"></i>Smart Agricultural Loan System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'login' %}">Sign In</a>
                <a class="nav-link btn btn-outline-light ms-2" href="{% url 'register' %}">Register</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow-1">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 Smart Agricultural Loan System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
